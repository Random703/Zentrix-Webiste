server {
    listen 80;
    listen [::]:80;
    server_name zentrix.com www.zentrix.com;

    root /var/www/zentrix/site;
    index index.html;

    # Pretty URLs: /about resolves to /about.html if it exists
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets aggressively; HTML stays revalidated
    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /index.html;
}
